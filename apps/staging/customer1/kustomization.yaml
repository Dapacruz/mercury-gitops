apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/customer1/
patches:
  - target:
      kind: SecretProviderClass
      name: customer1-secrets
    patch: |-
      - op: replace
        path: /spec/parameters/userAssignedIdentityID
        value: "d52c5289-10b4-462f-b5ce-75388948f84d"
      - op: replace
        path: /spec/parameters/tenantId
        value: "488cd0ad-9f25-4676-a378-b80a1063b0ab"
  - target:
      kind: ObjectStore
      name: customer1-objectstore
    patch: |-
      - op: replace
        path: /spec/configuration/destinationPath
        value: "https://orionbackupsstgcv1n.blob.core.windows.net/customer1"
  - target:
      kind: Ingress
      name: customer1-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "customer1.orion-prod.kubecraftlabs.com"
      - op: replace
        path: /spec/rules/0/host
        value: "customer1.orion-prod.kubecraftlabs.com"
